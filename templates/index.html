<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>My Todos</h1>

    <form action="/add" method="POST" class="add-form">
      <input type="text" name="title" placeholder="Add a new todo..." required autofocus>
      <button type="submit">Add</button>
    </form>

    <ul class="todo-list">
      {% for todo in todos %}
      <li class="{{ 'done' if todo.done }}">
        <a href="/toggle/{{ todo.id }}" class="toggle">
          {{ '✓' if todo.done else '○' }}
        </a>
        <span>{{ todo.title }}</span>
        <a href="/delete/{{ todo.id }}" class="delete">✕</a>
      </li>
      {% else %}
      <li class="empty">No todos yet. Add one above!</li>
      {% endfor %}
    </ul>
  </div>
</body>
</html>
